# @package _global_
defaults:
  - base.yaml
  - _self_

env:
  _target_: lmask.envs.TSPTWEnv
  lookahead_step: 2

model:
  _target_: lmask.models.model.LMaskPenaltyModel
  policy:
    _target_: lmask.models.policy.TSPTWPolicy
  penalty_type: combined_penalty
  entropy_coef: 0.05
  optimizer_kwargs:
    lr: 1e-4
  batch_size: 128
  val_batch_size: 128
  train_data_size: 100_000
  val_data_size: 1_000
  test_data_size: 1_000
  train_file: data/feasible/npz/n100_amai_sw/train_100k.npz
  val_file: data/feasible/npz/n100_amai_sw/val_1k.npz
  test_file: data/feasible/npz/n100_amai_sw/test_1k.npz
  data_normalize: auto

trainer:
  max_epochs: 500
  check_val_every_n_epoch: 1

callbacks:
  model_checkpoint:
    save_top_k: -1
    save_last: True
    every_n_epochs: 1
    dirpath:  ${paths.output_dir}/checkpoints
    filename: "{epoch:03d}-max_aug_reward{val/max_aug_reward:.2f}"
    monitor: "val/max_aug_reward"
